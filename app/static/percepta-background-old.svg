<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="discrete" tableValues="0 0 0 0.08"/>
      </feComponentTransfer>
    </filter>
    
    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#52525b" stroke-width="0.5" opacity="0.15"/>
    </pattern>
    
    <!-- Depth gradients -->
    <radialGradient id="mesh1" cx="25%" cy="25%">
      <stop offset="0%" stop-color="#3f3f46"/>
      <stop offset="100%" stop-color="#27272a"/>
    </radialGradient>
    
    <radialGradient id="mesh2" cx="75%" cy="75%">
      <stop offset="0%" stop-color="#3f3f46"/>
      <stop offset="100%" stop-color="#18181b"/>
    </radialGradient>
    
    <!-- Accent gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#71717a" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#52525b" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#3f3f46" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  
  <!-- Base layer: charcoal gray -->
  <rect width="1920" height="1080" fill="#27272a"/>
  
  <!-- Gradient depth -->
  <rect width="1920" height="1080" fill="url(#mesh1)" opacity="0.6"/>
  <rect width="1920" height="1080" fill="url(#mesh2)" opacity="0.4"/>
  
  <!-- Grid pattern -->
  <rect width="1920" height="1080" fill="url(#grid)"/>
  
  <!-- Accent overlay -->
  <rect width="1920" height="1080" fill="url(#accent)"/>
  
  <!-- UI analysis geometric elements -->
  <g opacity="0.25">
    <!-- Quadrant dividers -->
    <line x1="960" y1="0" x2="960" y2="1080" stroke="#71717a" stroke-width="1" stroke-dasharray="10 15"/>
    <line x1="0" y1="540" x2="1920" y2="540" stroke="#71717a" stroke-width="1" stroke-dasharray="10 15"/>
    
    <!-- Measurement zones -->
    <circle cx="400" cy="300" r="150" fill="none" stroke="#a1a1aa" stroke-width="1.5" opacity="0.3"/>
    <circle cx="400" cy="300" r="100" fill="none" stroke="#a1a1aa" stroke-width="1" opacity="0.2"/>
    
    <circle cx="1520" cy="780" r="200" fill="none" stroke="#a1a1aa" stroke-width="1.5" opacity="0.25"/>
    <circle cx="1520" cy="780" r="130" fill="none" stroke="#a1a1aa" stroke-width="1" opacity="0.15"/>
    
    <!-- Spacing markers -->
    <g transform="translate(1700, 150)">
      <rect x="0" y="0" width="4" height="80" fill="#a1a1aa" opacity="0.4"/>
      <rect x="0" y="100" width="4" height="50" fill="#a1a1aa" opacity="0.4"/>
      <rect x="0" y="170" width="4" height="100" fill="#a1a1aa" opacity="0.4"/>
    </g>
    
    <!-- Corner elements -->
    <rect x="100" y="100" width="200" height="1" fill="#71717a" opacity="0.3"/>
    <rect x="100" y="100" width="1" height="150" fill="#71717a" opacity="0.3"/>
  </g>
  
  <!-- Noise overlay -->
  <rect width="1920" height="1080" filter="url(#noise)"/>
</svg>
